services:
  - type: web
    name: buscursor-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 10
      - key: ADMIN_PANEL_PASSWORD
        sync: false
      - key: PAYMENT_GATEWAY_SECRET
        sync: false
      - key: ALLOW_INSECURE_WALLET_TOPUP
        value: false
      - key: ALLOW_INSECURE_FIREBASE_AUTH
        value: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_DRIVER_LOGINS_COLLECTION
        value: driverLogins
      - key: CORS_ORIGIN
        sync: false

  - type: static
    name: buscursor-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
